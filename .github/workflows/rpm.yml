name: Build RPM (AlmaLinux 9)

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rpm:
    name: Build AlmaLinux 9 RPM
    runs-on: ubuntu-latest
    container:
      image: almalinux:9

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf -y install \
            rpm-build rpmdevtools \
            gcc libcap \
            tar

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --no-modify-path
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: almalinux9-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: almalinux9-cargo-

      - name: Build vendor tarball and RPM
        run: |
          source "${HOME}/.cargo/env"
          make vendor
          make rpm RPMBUILD_OPTS=--nodeps

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kmsrdp-alma9-rpms
          path: .rpmbuild/RPMS/**/*.rpm
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .rpmbuild/RPMS/**/*.rpm
