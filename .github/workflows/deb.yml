name: Build deb (Ubuntu)

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Ubuntu .deb
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04

    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl build-essential debhelper \
            pkg-config libfuse3-dev libcap2-bin \
            xz-utils

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --no-modify-path
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ubuntu24-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu24-cargo-

      - name: Build .deb
        shell: bash
        run: |
          source "${HOME}/.cargo/env"
          make deb

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kmsrdp-ubuntu-debs
          path: .debbuild/*.deb
          if-no-files-found: error
          include-hidden-files: true

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: .debbuild/*.deb
