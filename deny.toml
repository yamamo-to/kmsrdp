# Dependency policy for kmsrdp (cargo-deny).
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# Fail only on unmaintained direct workspace deps; transitive noise is ignored.
unmaintained = "workspace"
ignore = [
    # rsa (sspi → picky): Marvin Attack; no upstream fix yet. CredSSP/NTLM only.
    { id = "RUSTSEC-2023-0071", reason = "no patched rsa; CredSSP/NTLM timing oracle not practically exploitable in our deployment model" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "WTFPL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
